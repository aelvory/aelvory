# Build the VSCode extension as a single platform-agnostic .vsix.
#
# The earlier per-target matrix is gone: with sql.js (WebAssembly
# SQLite) replacing better-sqlite3 in the webview build, there's
# nothing platform-specific in the .vsix anymore. One artifact runs
# on every OS / arch / VSCode version.
#
# Trigger: on tag push `vscode-v*` for releases, or manually via
# workflow_dispatch. Push a tag like `vscode-v0.0.2` to ship.
name: vscode-extension

on:
  push:
    tags:
      - 'vscode-v*'
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter aelvory-vscode build

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package
        working-directory: apps/vscode-extension
        run: vsce package --no-dependencies

      - uses: actions/upload-artifact@v4
        with:
          name: aelvory-vscode
          path: apps/vscode-extension/*.vsix
          if-no-files-found: error

      # Attach the .vsix to the GitHub release on tag push, so users
      # can grab it from the Releases page without needing the
      # marketplace.
      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/vscode-v')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/vscode-extension/*.vsix

      # Optional: publish to the VSCode marketplace. Uncomment after
      # creating a VSCE_PAT secret (token from
      # https://dev.azure.com/<org>/_usersSettings/tokens with
      # Marketplace > Manage scope).
      #
      # - name: Publish to marketplace
      #   if: startsWith(github.ref, 'refs/tags/vscode-v')
      #   working-directory: apps/vscode-extension
      #   env:
      #     VSCE_PAT: ${{ secrets.VSCE_PAT }}
      #   run: vsce publish --no-dependencies --pat $VSCE_PAT
