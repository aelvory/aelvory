# Build the Tauri desktop app for every supported OS / arch on tag push,
# then publish a single GitHub release with all platform installers.
#
# Trigger: push a tag matching `desktop-v*` (e.g. `desktop-v0.0.4`),
# or run manually via workflow_dispatch.
#
# Two-phase shape (mirrors the proven pattern in qubic/core-bob's
# release.yml — build first, publish second):
#
#   1. `build` (matrix of 4) — compile + bundle per platform.
#      Each leg uploads its bundles as a workflow artifact named
#      after the platform label.
#
#   2. `publish` (single Ubuntu job) — downloads every platform's
#      artifact and creates ONE GitHub draft release with all of
#      them attached. Single API call, no race. Idempotent re-runs:
#      softprops/action-gh-release@v2 appends to the existing draft
#      instead of creating duplicates.
#
# Why split: the earlier matrix-only shape had each of 4 legs trying
# to create the same draft release in parallel via tauri-action's
# built-in upload, which raced and silently failed in this org's
# Actions environment. Splitting puts the release call on one
# serial job; tauri-action is now build-only.
#
# Code signing is OFF by default (commented). Add the matching
# secrets and uncomment the env blocks if you want signed builds:
#   - macOS:   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
#              APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD,
#              APPLE_TEAM_ID
#   - Windows: tauri-action's signed-msi inputs (or use
#              SignTool with a code-signing cert separately).
#
# Linux builds are unsigned — the typical distribution is .AppImage
# or .deb, which don't have an OS-level signing model anyway.
name: desktop-release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

# softprops/action-gh-release in the publish job needs contents:write
# to create / edit the GitHub release. Both the org and repo
# "Workflow permissions" must also be set to "Read and write
# permissions" or this elevation is a no-op.
permissions:
  contents: write

jobs:
  build:
    strategy:
      # `fail-fast: false` so a single platform's failure doesn't
      # kill the others — partial release artifacts are still useful
      # and the publish job can decide what to do with them.
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (M-series). macOS-latest = arm64 since 2024.
          # Intel macOS (x86_64-apple-darwin) is intentionally NOT in
          # the matrix: GitHub's only Intel runner (macos-13) is
          # progressively deprecated and now queues indefinitely on
          # free-tier accounts. Intel Mac users can build from source
          # or fall back to the arm64 build via Rosetta 2 (where
          # available — Rosetta only goes arm64→intel-emulation, NOT
          # the reverse, so for true Intel Mac users this is "build
          # locally"). When demand picks up, swap in cross-compile
          # from macos-latest (arm64) targeting x86_64-apple-darwin.
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          # Windows x64.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
          # Linux x64. ubuntu-22.04 still works — but we now install
          # webkit2gtk-4.1 (not 4.0), since Tauri 2's current default
          # is the 4.1 branch. 22.04's universe repo ships both, so
          # we don't need to bump to 24.04.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Linux Tauri prereqs: webkit2gtk-4.1 + libsoup-3.0 +
      # javascriptcoregtk-4.1 for the embedded webview. macOS and
      # Windows ship the webview with the OS, so no equivalent step
      # is needed there.
      - name: Install Linux Tauri prerequisites
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust target dir
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ matrix.label }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: ${{ matrix.label }}-cargo-

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # tauri-action runs the build + bundle. NO release flags here
      # (no tagName, no releaseDraft, no releaseId) — that means it
      # builds the bundles into the matrix target dir and stops.
      # The `publish` job below picks them up via the workflow
      # artifact uploaded next.
      # When you wire Apple code signing, add an `env:` block here
      # with APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD /
      # APPLE_SIGNING_IDENTITY / APPLE_ID / APPLE_PASSWORD /
      # APPLE_TEAM_ID populated from secrets. (An empty `env:` block
      # with only commented-out lines is rejected by Actions's YAML
      # loader as "Unexpected value ''".)
      - uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}

      # Hand off bundles to the publish job. The bundle dir layout
      # differs per platform (msi/, nsis/, dmg/, deb/, appimage/, rpm/),
      # so the path glob covers all of them — `if-no-files-found:
      # warn` keeps the artifact creation succeeding even if a
      # particular OS doesn't produce every bundle type.
      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: aelvory-desktop-${{ matrix.label }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
          if-no-files-found: warn
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    # `if: always()` so partial successes still publish what they
    # have — e.g. if Windows fails but the other 3 produced bundles,
    # the release still goes out with 3 platforms attached. Replace
    # with `if: success()` if you'd rather block all-or-nothing.
    if: always() && (needs.build.result == 'success' || needs.build.result == 'failure')

    steps:
      # Pull every platform's artifacts into one local directory.
      # `pattern: aelvory-desktop-*` matches all four matrix
      # uploads; `merge-multiple: true` flattens them into one tree
      # (no per-platform subdir), which makes the `files:` glob
      # below simpler.
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: aelvory-desktop-*
          merge-multiple: true
          path: artifacts/

      - name: List downloaded artifacts
        run: |
          echo "Files to publish:"
          find artifacts/ -type f | sort
          echo "Total: $(find artifacts/ -type f | wc -l) files"

      # Single source of release-creation truth. softprops handles
      # the find-or-create dance idempotently against the tag, so
      # re-runs of this job never duplicate.
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: 'Desktop ${{ github.ref_name }}'
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: false
          # `fail_on_unmatched_files: false` — if a platform's build
          # legitimately failed and produced nothing, don't take the
          # release down with it. The publish step still attaches
          # whatever artifacts the successful platforms uploaded.
          fail_on_unmatched_files: false
          files: |
            artifacts/*.dmg
            artifacts/*.app.tar.gz
            artifacts/*.msi
            artifacts/*-setup.exe
            artifacts/*.deb
            artifacts/*.AppImage
            artifacts/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
